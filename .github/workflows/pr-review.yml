# Example workflow that consumers of the Action would add to their repo.
# (Lives here so we can dogfood the Action on this repo too.)
name: PR Review Copilot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PR Review Copilot
        uses: JAGADEESHWARAN20/pr-review-copilot@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
